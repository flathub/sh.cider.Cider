app-id: sh.cider.Cider
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: cider-wrapper
rename-desktop-file: cider.desktop
rename-icon: cider
finish-args:
  - --device=dri
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --own-name=org.mpris.MediaPlayer2.cider
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  #- --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.dbusmenu
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
cleanup:
  - /share/icons/hicolor/1024x1024
modules:
  - name: cider
    buildsystem: simple
    build-commands:
      - install -dm755 ${FLATPAK_DEST}/cider
      - |
        bsdtar -Oxf cider.deb 'data.tar*' |
        bsdtar -xf - \
        -C ${FLATPAK_DEST}/cider \
        --strip-components=4 \
        ./usr/lib/cider
      - |
        bsdtar -Oxf cider.deb 'data.tar*' |
        bsdtar -xf - \
        -C ${FLATPAK_DEST} \
        --strip-components=2 \
        --exclude=./usr/share/doc \
        ./usr/share
      - install -Dm755 cider-wrapper /app/bin/cider-wrapper
      - desktop-file-edit --set-key=Exec --set-value=cider-wrapper ${FLATPAK_DEST}/share/applications/cider.desktop
      - install -Dm644 ${FLATPAK_DEST}/share/pixmaps/cider.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/cider.png
      - install -Dm755 stub_sandbox ${FLATPAK_DEST}/cider/chrome-sandbox
      - install -Dm755 cider -t ${FLATPAK_DEST}/bin/
      - install -Dm644 -t /app/share/metainfo ${FLATPAK_ID}.metainfo.xml
    sources:
      - type: file
        dest-filename: cider.deb
        url: https://repo.cider.sh/apt/pool/main/cider-v4.0.0-linux-x64.deb
        sha256: 67907b5506ad4c492db787bb685e441834ee7e0c1f447273099d4b89afda2059
        x-checker-data:
          type: debian-repo
          package-name: cider
          root: https://repo.cider.sh/apt/
          dist: stable
          component: main
      - type: script
        dest-filename: cider
        commands:
          # share chromium singleton between multiple session, needed for flatpak<1.11.1
          - export TMPDIR=$XDG_RUNTIME_DIR/app/$FLATPAK_ID
          - exec zypak-wrapper /app/cider/Cider "$@"
      - type: script
        dest-filename: stub_sandbox
        commands:
          - |
            echo Stub sandbox ignoring command: $@
            exit 1
      - type: file
        path: cider-wrapper
      - type: file
        path: sh.cider.Cider.metainfo.xml
